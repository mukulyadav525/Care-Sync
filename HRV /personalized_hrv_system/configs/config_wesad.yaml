# Configuration for the WESAD dataset (Wearable Stress and Affect Detection)
# 15 healthy subjects, Empatica E4. WESAD ships the RAW E4 CSV export per subject
# nested in <SID>/<SID>_E4_Data/ (ACC/BVP/EDA/HR/IBI/TEMP/tags.csv) — i.e. the
# SAME format as Stress-Predict, so we reuse the e4_raw loader.

data:
  format: "e4_raw"                  # WESAD = same E4 CSV format (nested folder auto-resolved)
  # Path RELATIVE TO THE PARENT of this project dir. Adjust to your server path,
  # e.g. "Mukul_Per/WESAD" so that <raw_root>/S2/S2_E4_Data/HR.csv exists.
  raw_root: "WESAD"
  subjects: null                    # null = all S* folders found; or e.g. ["S2","S3"]

resample:
  freq: "1s"

cleaning:
  hr_min_bpm: 30
  hr_max_bpm: 220
  ibi_min_s: 0.3
  ibi_max_s: 2.0
  bvp_bandpass_hz: [0.5, 8.0]
  eda_lowpass_hz: 1.0
  max_interpolate_gap_s: 5
  max_segment_gap_s: 60

features:
  hr_windows_s: [30, 60, 300]
  hrv_windows_s: [60, 300]
  acc_windows_s: [10, 60]
  bvp_agg_window_s: 1
  activity_thresholds_g: [0.05, 0.2, 0.5]

model:
  input_seq_len_s: 120        # 2 min context (short E4 sessions)
  horizons_s: [60, 300, 600]
  predict_rmssd: true
  stride_s: 5
  hidden_channels: 32
  tcn_levels: 4
  kernel_size: 3
  dropout: 0.2
  batch_size: 64
  epochs: 40
  lr: 0.001
  nll_beta: 0.5
  val_fraction: 0.15
  test_fraction: 0.15

anomaly:
  ewma_lambda: 0.02
  z_thresh: 3.0
  consecutive_required: 3
  pi_multiplier: 1.96

simulation:
  duration_h: 24
  sample_rate_hz: 1

online:
  recent_fraction: 0.2
  epochs: 3
  lr_fraction: 0.1
  val_fraction: 0.2
